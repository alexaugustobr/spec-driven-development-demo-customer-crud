<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Clientes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.12);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        h1 { font-size: 1.5rem; color: #111827; margin-bottom: .375rem; }
        .subtitle { color: #6b7280; font-size: .9rem; margin-bottom: 2rem; }
        .error-banner {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #dc2626;
            padding: .75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: .875rem;
        }
        .field { margin-bottom: 1.25rem; }
        label { display: block; font-size: .875rem; font-weight: 500; color: #374151; margin-bottom: .375rem; }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: .625rem .75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color .15s, box-shadow .15s;
        }
        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,.15);
        }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 5rem; }
        .toggle-btn {
            position: absolute;
            right: .625rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
            font-size: .8rem;
            font-weight: 500;
            padding: .25rem .375rem;
        }
        .toggle-btn:hover { color: #374151; }
        .btn-submit {
            width: 100%;
            padding: .7rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .15s;
            margin-top: .5rem;
        }
        .btn-submit:hover:not([disabled]) { background: #1d4ed8; }
        .btn-submit[disabled] { background: #93c5fd; cursor: not-allowed; }
        .btn-loading { display: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>Gestão de Clientes</h1>
    <p class="subtitle">Entre com suas credenciais para acessar o sistema.</p>

    <div class="error-banner" th:if="${param.error}">
        E-mail ou senha inválidos.
    </div>

    <form th:action="@{/login}" method="post" id="loginForm">
        <div class="field">
            <label for="username">E-mail</label>
            <input type="email" id="username" name="username"
                   required autocomplete="email" placeholder="seu@email.com">
        </div>
        <div class="field">
            <label for="password">Senha</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password"
                       required autocomplete="current-password" placeholder="••••••••">
                <button type="button" class="toggle-btn" id="toggleBtn" onclick="togglePassword()">
                    Mostrar
                </button>
            </div>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">
            <span class="btn-label">Entrar</span>
            <span class="btn-loading">Entrando...</span>
        </button>
    </form>
</div>
<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const btn = document.getElementById('toggleBtn');
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = 'Ocultar';
        } else {
            input.type = 'password';
            btn.textContent = 'Mostrar';
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function () {
        const btn = document.getElementById('submitBtn');
        btn.querySelector('.btn-label').style.display = 'none';
        btn.querySelector('.btn-loading').style.display = 'inline';
        btn.disabled = true;
    });
</script>
</body>
</html>
