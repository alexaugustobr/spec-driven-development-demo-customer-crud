<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${customer.name} + ' - Gestão de Clientes'">Cliente - Gestão de Clientes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
        }
        .header {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 1.25rem; color: #111827; }
        .header-actions { display: flex; gap: .75rem; align-items: center; }
        .btn-secondary {
            padding: .5rem 1rem;
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-secondary:hover { background: #f9fafb; }
        .btn-primary {
            padding: .5rem 1rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .container {
            max-width: 720px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.12);
            padding: 2rem;
        }
        .alert-success {
            background: #ecfdf5;
            border-left: 4px solid #10b981;
            color: #065f46;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: .9rem;
        }
        .detail-row {
            display: flex;
            padding: .875rem 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label {
            width: 160px;
            flex-shrink: 0;
            font-size: .8rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: .05em;
            padding-top: 2px;
        }
        .detail-value {
            font-size: .95rem;
            color: #111827;
        }
        .detail-section {
            margin-bottom: .5rem;
        }
        .detail-section-title {
            font-size: .75rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: .1em;
            padding: 1rem 0 .5rem;
            border-bottom: 2px solid #e5e7eb;
            margin-bottom: .25rem;
        }
    </style>
</head>
<body>
<div class="header">
    <h1 th:text="${customer.name}">Detalhes do Cliente</h1>
    <div class="header-actions">
        <a th:href="@{/customers/{id}/edit(id=${customer.id})}"
           th:if="${isAdmin}" class="btn-primary">Editar</a>
        <a href="/customers" class="btn-secondary">Voltar para lista</a>
    </div>
</div>

<div class="container">
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>

    <div class="card">
        <div class="detail-section-title">Informações Pessoais</div>

        <div class="detail-row">
            <span class="detail-label">Nome</span>
            <span class="detail-value" th:text="${customer.name}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">E-mail</span>
            <span class="detail-value" th:text="${customer.email}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Documento</span>
            <span class="detail-value" th:text="${customer.document}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Telefone</span>
            <span class="detail-value" th:text="${customer.phone}"></span>
        </div>

        <div class="detail-section-title">Endereço</div>

        <div class="detail-row">
            <span class="detail-label">CEP</span>
            <span class="detail-value" th:text="${customer.zipCode}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Logradouro</span>
            <span class="detail-value" th:text="${customer.street}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Bairro</span>
            <span class="detail-value" th:text="${customer.neighborhood}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Cidade</span>
            <span class="detail-value" th:text="${customer.city}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Estado</span>
            <span class="detail-value" th:text="${customer.state}"></span>
        </div>

        <div class="detail-section-title">Cadastro</div>

        <div class="detail-row">
            <span class="detail-label">Data de Cadastro</span>
            <span class="detail-value" th:text="${#temporals.format(customer.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
        </div>
    </div>
</div>
</body>
</html>
