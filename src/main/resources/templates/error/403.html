<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Negado - Gestão de Clientes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,.12);
            padding: 3rem 2rem;
            max-width: 440px;
            width: 90%;
        }
        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .error-container h1 {
            font-size: 1.5rem;
            color: #111827;
            margin-bottom: .75rem;
        }
        .error-container p {
            font-size: .95rem;
            color: #6b7280;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .error-container a {
            display: inline-block;
            padding: .625rem 1.5rem;
            background: #2563eb;
            color: #fff;
            border-radius: 6px;
            font-size: .9rem;
            font-weight: 500;
            text-decoration: none;
        }
        .error-container a:hover { background: #1d4ed8; }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">&#128274;</div>
    <h1>Acesso Negado</h1>
    <p>Você não tem permissão para acessar esta página.</p>
    <a href="/customers">Voltar para lista</a>
</div>
</body>
</html>
